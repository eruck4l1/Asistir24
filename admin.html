<h1>Panel Admin</h1>
<table border="1" cellpadding="5" style="color:black; background:white; width:100%">
  <thead>
    <tr>
      <th>Marca</th>
      <th>Modelo</th>
      <th>Patente</th>
      <th>Seguro</th>
      <th>Mail</th>
      <th>Plan</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>

<script>
fetch("https://asistir24-backend.onrender.com/api/admin")
  .then(res => res.json())
  .then(data => {
    const lista = document.getElementById("lista");
    data.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.marca}</td>
        <td>${item.modelo}</td>
        <td>${item.patente}</td>
        <td>${item.seguro}</td>
        <td>${item.mail}</td>
        <td>${item.plan}</td>
      `;
      lista.appendChild(tr);
    });
  });
</script>
