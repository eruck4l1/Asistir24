<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistir24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background: #0f172a; color: white; }
    header { padding: 20px; text-align: center; background: #020617; }
    h1 { margin: 0; }
    .container { padding: 20px; text-align: center; }
    .planes { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .plan {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }
    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      color: white;
      cursor: pointer;
      width: 100%;
    }
    form { margin-top: 20px; }
    input { padding: 10px; margin: 5px; width: 200px; }
  </style>
</head>
<body>

<header>
  <h1>Asistir24</h1>
  <p>Servicio de traslado 24hs</p>
</header>

<div class="container">

  <h2>Planes</h2>

  <div class="planes">
    <div class="plan">
      <h3>Básico</h3>
      <p>$5000/mes</p>
      <button onclick="selectPlan('Basico')">Contratar</button>
    </div>

    <div class="plan">
      <h3>Pro</h3>
      <p>$9000/mes</p>
      <button onclick="selectPlan('Pro')">Contratar</button>
    </div>

    <div class="plan">
      <h3>Premium</h3>
      <p>$15000/mes</p>
      <button onclick="selectPlan('Premium')">Contratar</button>
    </div>
  </div>

  <h2>Contratar Servicio</h2>

  <form id="form">
    <input type="text" id="nombre" placeholder="Nombre" required><br>
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="hidden" id="plan">
    <button type="submit">Enviar</button>
  </form>

  <br>

  <a href="https://wa.me/5491126433243" target="_blank">
    <button>WhatsApp</button>
  </a>

</div>

<script>
function selectPlan(p) {
  document.getElementById("plan").value = p;
  alert("Seleccionaste el plan " + p);
}

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    nombre: document.getElementById("nombre").value,
    email: document.getElementById("email").value,
    plan: document.getElementById("plan").value
  };

  fetch("https://asistir24-backend.onrender.com/api/contratar", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => alert("Solicitud enviada"))
});
</script>

</body>
</html>
