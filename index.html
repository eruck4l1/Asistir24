<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistir24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background: #0f172a; color: white; }
    header { padding: 20px; text-align: center; background: #020617; }
    h1 { margin: 0; }
    .container { padding: 20px; text-align: center; }
    .plan {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      max-width: 300px;
      margin: auto;
    }
    button {
      border: none;
      padding: 12px;
      color: white;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      font-size: 16px;
    }
    .btn-asociarse { background: #22c55e; }
    .btn-emergencia { background: #ef4444; }
    input { padding: 10px; margin: 5px; width: 90%; }
    form { margin-top: 15px; }
  </style>
</head>
<body>

<header>
  <h1>Asistir24</h1>
  <p>Servicio de traslado y asistencia 24hs</p>
</header>

<div class="container">

  <h2>Plan Básico</h2>

  <div class="plan">
    <p>$5000/mes</p>
    <p>✔ Traslado 24hs</p>
    <p>✔ Atención inmediata</p>
    <p>✔ Cobertura local</p>

    <button class="btn-asociarse" onclick="mostrarForm()">
      Asociarse
    </button>

    <a href="https://wa.me/5491126433243" target="_blank">
      <button class="btn-emergencia">
        🚨 Emergencia
      </button>
    </a>

  </div>

  <form id="form" style="display:none;">
    <input type="text" id="nombre" placeholder="Nombre" required><br>
    <input type="email" id="email" placeholder="Email" required><br>
    <button type="submit">Confirmar Asociación</button>
  </form>

</div>

<script>
function mostrarForm() {
  document.getElementById("form").style.display = "block";
}

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    nombre: document.getElementById("nombre").value,
    email: document.getElementById("email").value,
    plan: "Basico"
  };

  fetch("https://asistir24-backend.onrender.com/api/contratar", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    alert("Asociación enviada");
    document.getElementById("form").reset();
  });
});
</script>

</body>
</html>
